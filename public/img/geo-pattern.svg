<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <clipPath id="tile"><rect width="80" height="80"/></clipPath>
    <g id="star8" fill="none" stroke="#6f9cd6" stroke-opacity="0.34" stroke-width="1" stroke-linejoin="miter">
      <polygon points="28,0 19.8,8.2 19.8,19.8 8.2,19.8 0,28 -8.2,19.8 -19.8,19.8 -19.8,8.2 -28,0 -19.8,-8.2 -19.8,-19.8 -8.2,-19.8 0,-28 8.2,-19.8 19.8,-19.8 19.8,-8.2"/>
    </g>
    <polygon id="octagon" points="12.93,5.36 5.36,12.93 -5.36,12.93 -12.93,5.36 -12.93,-5.36 -5.36,-12.93 5.36,-12.93 12.93,-5.36"
      fill="none" stroke="#6f9cd6" stroke-opacity="0.30" stroke-width="1" stroke-linejoin="miter"/>
